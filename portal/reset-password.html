<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nieuw wachtwoord — Doable AI</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F2EDE4; --surface: #FFFFFF; --ink: #18160F; --ink-muted: #64604E;
      --ink-faint: #A8A391; --accent: #3D6B50; --accent-h: #2F5440;
      --border: rgba(24,22,15,0.09); --border-s: rgba(24,22,15,0.15);
      --r: 8px; --r-lg: 14px; --shadow-md: 0 4px 24px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --bg: #0A0906; --surface: #111009; --ink: #EDE8DF; --ink-muted: #8A8372;
      --ink-faint: #55524A; --accent: #5A9470; --accent-h: #6AAF82;
      --border: rgba(237,232,223,0.07); --border-s: rgba(237,232,223,0.14);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-md);
    }
    .logo {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .logo span { color: var(--accent); }
    .sub { font-size: 14px; color: var(--ink-muted); margin-bottom: 28px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    label { font-size: 13px; font-weight: 500; color: var(--ink-muted); }
    input {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border-s);
      border-radius: var(--r);
      background: var(--bg);
      color: var(--ink);
      font-family: 'Figtree', sans-serif;
      font-size: 14px;
      transition: border-color 150ms, box-shadow 150ms;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,107,80,0.10); }
    .btn {
      width: 100%; padding: 11px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--r);
      font-family: 'Figtree', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
      transition: background 140ms;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:hover { background: var(--accent-h); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: rgba(192,57,43,0.10); color: #C0392B;
      border-radius: var(--r); padding: 10px 12px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }
    .error-msg.show { display: block; }
    .success-msg {
      background: rgba(61,107,80,0.10); color: var(--accent);
      border-radius: var(--r); padding: 16px;
      font-size: 13px; text-align: center; display: none;
    }
    .success-msg.show { display: block; }
    .hint { font-size: 12px; color: var(--ink-faint); margin-top: 3px; }
    .strength-bar {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-top: 6px;
      overflow: hidden;
    }
    .strength-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 200ms, background 200ms;
      width: 0%;
    }
    .strength-label { font-size: 11px; margin-top: 3px; }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .back { text-align: center; margin-top: 20px; font-size: 13px; color: var(--ink-faint); }
    .back a { color: var(--accent); }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">Doable<span>.</span></div>
    <p class="sub">Kies een nieuw wachtwoord voor je account</p>

    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg">
      <div style="font-size:28px;margin-bottom:8px">✅</div>
      <div style="font-weight:600;margin-bottom:4px">Wachtwoord ingesteld!</div>
      <div>Je wordt over enkele seconden doorgestuurd naar het portaal.</div>
    </div>

    <form id="resetForm">
      <div class="form-group">
        <label for="pw">Nieuw wachtwoord</label>
        <input type="password" id="pw" placeholder="Minimaal 8 tekens" required autocomplete="new-password" />
        <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
        <div class="strength-label" id="strengthLabel"></div>
      </div>
      <div class="form-group">
        <label for="pwConfirm">Herhaal wachtwoord</label>
        <input type="password" id="pwConfirm" placeholder="••••••••" required autocomplete="new-password" />
      </div>
      <button type="submit" class="btn" id="saveBtn">
        <span class="btn-text">Wachtwoord opslaan →</span>
        <div class="spinner"></div>
      </button>
    </form>

    <div class="back"><a href="/login.html">← Terug naar inloggen</a></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal/js/config.js"></script>
  <script>
    // Password strength meter
    const pwInput = document.getElementById('pw');
    pwInput.addEventListener('input', () => {
      const val = pwInput.value;
      let score = 0;
      if (val.length >= 8)  score++;
      if (val.length >= 12) score++;
      if (/[A-Z]/.test(val)) score++;
      if (/[0-9]/.test(val)) score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');
      const pct   = (score / 5 * 100).toFixed(0) + '%';
      const colors = ['#E74C3C','#E74C3C','#E67E22','#F1C40F','#2ECC71','#27AE60'];
      const labels = ['','Zwak','Zwak','Redelijk','Sterk','Zeer sterk'];
      fill.style.width    = pct;
      fill.style.background = colors[score];
      label.textContent   = val.length > 0 ? labels[score] : '';
      label.style.color   = colors[score];
    });

    const errorMsg  = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    const form       = document.getElementById('resetForm');
    const saveBtn    = document.getElementById('saveBtn');

    // Handle the auth event from the reset link
    supabase.auth.onAuthStateChange(async (event, session) => {
      if (event === 'PASSWORD_RECOVERY') {
        // Session is set — form is ready for submission
        form.style.display = 'block';
      }
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMsg.classList.remove('show');

      const pw        = document.getElementById('pw').value;
      const pwConfirm = document.getElementById('pwConfirm').value;

      if (pw.length < 8) {
        errorMsg.textContent = 'Wachtwoord moet minimaal 8 tekens bevatten.';
        errorMsg.classList.add('show');
        return;
      }
      if (pw !== pwConfirm) {
        errorMsg.textContent = 'Wachtwoorden komen niet overeen.';
        errorMsg.classList.add('show');
        return;
      }

      saveBtn.classList.add('loading');
      saveBtn.disabled = true;

      const { error } = await supabase.auth.updateUser({ password: pw });

      saveBtn.classList.remove('loading');
      saveBtn.disabled = false;

      if (error) {
        errorMsg.textContent = error.message;
        errorMsg.classList.add('show');
        return;
      }

      form.style.display = 'none';
      successMsg.classList.add('show');

      // Redirect after 2.5s
      setTimeout(async () => {
        const { data: { user } } = await supabase.auth.getUser();
        const role = user?.user_metadata?.role ?? 'client';
        window.location.href = role === 'admin'
          ? '/portal/admin/index.html'
          : '/portal/client/index.html';
      }, 2500);
    });
  </script>
</body>
</html>
