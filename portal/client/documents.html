<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documenten — Doable AI Portaal</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/portal/portal.css" />
</head>
<body>
<div class="portal-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Doable<span>.</span><span class="sidebar-role-badge">Klant</span></div>
    <nav class="sidebar-nav">
      <a href="/portal/client/index.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Overzicht
      </a>
      <a href="/portal/client/messages.html" class="sidebar-link" id="navMessages">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Berichten
      </a>
      <a href="/portal/client/invoices.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
        Facturen
      </a>
      <a href="/portal/client/documents.html" class="sidebar-link active">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
        Documenten
      </a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="userAvatar">K</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">—</div>
          <div class="sidebar-user-role" id="userCompany">—</div>
        </div>
        <button class="logout-btn" onclick="logout()">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">Mijn documenten</span>
    </header>

    <div class="page-content">

      <div class="card">
        <div class="card-header">
          <span class="card-title" id="docCount">Documenten</span>
          <div style="display:flex;gap:8px;align-items:center">
            <select id="filterType" class="btn btn-outline btn-sm" style="font-weight:500;padding:5px 10px">
              <option value="">Alle types</option>
              <option value="rapport">Rapporten</option>
              <option value="contract">Contracten</option>
              <option value="handleiding">Handleidingen</option>
              <option value="offerte">Offertes</option>
              <option value="overig">Overig</option>
            </select>
            <input type="search" id="searchInput" placeholder="Zoek op titel…"
              style="padding:6px 10px;border:1px solid var(--border-s);border-radius:var(--r);background:var(--bg);color:var(--ink);font-size:13px;width:180px" />
          </div>
        </div>

        <!-- GRID VIEW -->
        <div id="docsGrid" style="padding:20px;display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px">
          <div style="grid-column:1/-1;text-align:center;padding:24px"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- CONTACT -->
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:18px 24px;margin-top:20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
        <div>
          <div style="font-weight:600;font-size:14px">Ontbreekt er een document?</div>
          <div style="font-size:13px;color:var(--ink-muted);margin-top:2px">Laat het weten via het berichtensysteem.</div>
        </div>
        <a href="/portal/client/messages.html" class="btn btn-primary btn-sm">Stuur bericht</a>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/portal/js/config.js"></script>
<script src="/portal/js/auth.js"></script>
<script>
let allDocs = [];

(async () => {
  const session = await requireAuth('client');
  if (!session) return;

  const client = await getMyClient();
  if (!client) { toast('Klantaccount niet gevonden.', 'error'); return; }

  const name = session.user.user_metadata?.name ?? session.user.email;
  document.getElementById('userName').textContent    = name;
  document.getElementById('userCompany').textContent = client.company_name;
  document.getElementById('userAvatar').textContent  = name.charAt(0).toUpperCase();

  const unread = await getUnreadCount(client.id);
  if (unread > 0) {
    document.getElementById('navMessages').insertAdjacentHTML('beforeend', `<span class="badge-dot">${unread}</span>`);
  }

  const { data, error } = await supabase
    .from('documents')
    .select('*')
    .eq('client_id', client.id)
    .order('created_at', { ascending: false });

  if (error) { handleError(error, 'loadDocs'); return; }
  allDocs = data ?? [];
  renderDocs(allDocs);
  document.getElementById('docCount').textContent = `Documenten (${allDocs.length})`;
})();

function renderDocs(list) {
  const grid = document.getElementById('docsGrid');
  if (list.length === 0) {
    grid.innerHTML = `<div style="grid-column:1/-1">
      <div class="empty-state">
        <div class="empty-state-icon">📁</div>
        <div class="empty-state-title">Nog geen documenten</div>
        <p>Opgeleverde documenten van Doable AI verschijnen hier.</p>
      </div>
    </div>`;
    return;
  }

  grid.innerHTML = list.map(d => `
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:20px;display:flex;flex-direction:column;gap:12px;transition:box-shadow 150ms ease" onmouseenter="this.style.boxShadow='0 4px 20px rgba(0,0,0,0.07)'" onmouseleave="this.style.boxShadow=''">
      <div style="font-size:36px;text-align:center">${fileIcon(d.file_path)}</div>
      <div style="flex:1">
        <div style="font-weight:600;font-size:13.5px;color:var(--ink);line-height:1.4;word-break:break-word">${esc(d.title)}</div>
        <div style="margin-top:4px;display:flex;align-items:center;gap:6px;flex-wrap:wrap">
          ${d.doc_type ? `<span style="font-size:11px;background:var(--surface-2);color:var(--ink-muted);border-radius:4px;padding:2px 6px">${esc(d.doc_type)}</span>` : ''}
          <span style="font-size:11px;color:var(--ink-faint)">${formatDate(d.created_at)}</span>
        </div>
      </div>
      <button class="btn btn-outline btn-sm" style="width:100%" onclick="downloadDoc('${esc(d.file_path)}','${esc(d.title)}')">
        <svg viewBox="0 0 24 24" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        Download
      </button>
    </div>
  `).join('');
}

function fileIcon(path) {
  if (!path) return '📄';
  const ext = path.split('.').pop().toLowerCase();
  if (['pdf'].includes(ext)) return '📕';
  if (['doc','docx'].includes(ext)) return '📝';
  if (['xls','xlsx'].includes(ext)) return '📊';
  if (['ppt','pptx'].includes(ext)) return '📑';
  if (['png','jpg','jpeg','gif'].includes(ext)) return '🖼️';
  if (['zip','rar'].includes(ext)) return '🗜️';
  return '📄';
}

document.getElementById('searchInput').addEventListener('input', filterDocs);
document.getElementById('filterType').addEventListener('change', filterDocs);
function filterDocs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const t = document.getElementById('filterType').value;
  renderDocs(allDocs.filter(d => {
    const mq = !q || d.title.toLowerCase().includes(q);
    const mt = !t || d.doc_type === t;
    return mq && mt;
  }));
}

async function downloadDoc(path, title) {
  const { data, error } = await supabase.storage.from('documents').createSignedUrl(path, 60);
  if (error) { handleError(error, 'download'); return; }
  const a = document.createElement('a');
  a.href = data.signedUrl; a.download = title; a.click();
}

function esc(str) {
  const d = document.createElement('div'); d.textContent = str ?? ''; return d.innerHTML;
}
</script>
</body>
</html>
