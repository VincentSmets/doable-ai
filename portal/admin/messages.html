<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Berichten — Doable AI Beheer</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/portal/portal.css" />
  <style>
    .messages-layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: calc(100vh - 56px);
      overflow: hidden;
    }
    .thread-list {
      border-right: 1px solid var(--border);
      overflow-y: auto;
      background: var(--surface);
    }
    .thread-list-header {
      padding: 16px 16px 12px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--ink-faint);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--surface);
      z-index: 1;
    }
    .thread-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 120ms ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .thread-item:hover { background: var(--surface-2); }
    .thread-item.active { background: var(--accent-soft); border-left: 3px solid var(--accent); }
    .thread-avatar {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      font-size: 13px; font-weight: 700;
      flex-shrink: 0;
      color: var(--ink-muted);
    }
    .thread-item.active .thread-avatar { background: var(--accent); color: #fff; }
    .thread-info { flex: 1; min-width: 0; }
    .thread-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .thread-preview { font-size: 12px; color: var(--ink-faint); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .thread-meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
    .thread-time { font-size: 11px; color: var(--ink-faint); }
    .thread-unread {
      background: var(--accent);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      min-width: 18px; height: 18px;
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      padding: 0 5px;
    }

    /* Chat area */
    .chat-area {
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    .chat-header {
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-header-info .chat-client-name { font-size: 14px; font-weight: 700; }
    .chat-header-info .chat-client-sub { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .chat-empty {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 8px;
      color: var(--ink-faint);
    }
    .chat-empty-icon { font-size: 40px; }
    .chat-empty-title { font-size: 15px; font-weight: 600; color: var(--ink-muted); }
    .chat-empty-sub { font-size: 13px; }
    .chat-footer {
      padding: 16px 20px;
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      gap: 10px;
      align-items: flex-end;
      flex-shrink: 0;
    }
    .chat-input {
      flex: 1;
      border: 1px solid var(--border-s);
      border-radius: var(--r);
      padding: 10px 12px;
      font-size: 13.5px;
      font-family: inherit;
      background: var(--bg);
      color: var(--ink);
      resize: none;
      max-height: 120px;
      min-height: 40px;
      line-height: 1.5;
    }
    .chat-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,107,80,0.10); }
    .chat-send-btn {
      flex-shrink: 0;
      width: 40px; height: 40px;
      border-radius: var(--r);
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 140ms;
    }
    .chat-send-btn:hover { background: var(--accent-h); }
    .chat-send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .chat-send-btn svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .no-thread-selected {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px; color: var(--ink-faint);
    }
  </style>
</head>
<body>
<div class="portal-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Doable<span>.</span><span class="sidebar-role-badge">Admin</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Overzicht</div>
      <a href="/portal/admin/index.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <div class="sidebar-section">Klanten</div>
      <a href="/portal/admin/clients.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>CRM — Klanten</a>
      <a href="/portal/admin/messages.html" class="sidebar-link active">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Berichten</a>
      <div class="sidebar-section">Financieel</div>
      <a href="/portal/admin/invoices.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Facturen</a>
      <a href="/portal/admin/proposals.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Offertes</a>
      <div class="sidebar-section">Projecten</div>
      <a href="/portal/admin/documents.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Documenten</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="userAvatar">V</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">Vincent</div>
          <div class="sidebar-user-role">Beheerder</div>
        </div>
        <button class="logout-btn" onclick="logout()">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-content" style="display:flex;flex-direction:column;padding:0;overflow:hidden">
    <header class="topbar" style="flex-shrink:0">
      <span class="topbar-title">Berichten</span>
    </header>

    <div class="messages-layout" style="flex:1">
      <!-- THREAD LIST -->
      <div class="thread-list" id="threadList">
        <div class="thread-list-header">Klanten</div>
        <div id="threadItems">
          <div style="padding:24px;text-align:center"><div class="spinner"></div></div>
        </div>
      </div>

      <!-- CHAT AREA -->
      <div class="chat-area" id="chatArea">
        <div class="no-thread-selected" id="noThreadSelected">
          <div style="font-size:40px">💬</div>
          <div style="font-size:15px;font-weight:600;color:var(--ink-muted)">Selecteer een klant</div>
          <div style="font-size:13px">Kies een klant links om het gesprek te zien.</div>
        </div>
        <!-- Visible when thread is selected -->
        <div id="activeChatWrapper" style="display:none;flex-direction:column;height:100%">
          <div class="chat-header">
            <div class="chat-header-info">
              <div class="chat-client-name" id="chatClientName">—</div>
              <div class="chat-client-sub" id="chatClientSub">—</div>
            </div>
            <a href="#" id="chatClientLink" class="btn btn-ghost btn-sm">Klantprofiel →</a>
          </div>
          <div class="chat-messages" id="chatMessages"></div>
          <div class="chat-footer">
            <textarea class="chat-input" id="chatInput" placeholder="Stuur een bericht…" rows="1"></textarea>
            <button class="chat-send-btn" id="chatSendBtn" onclick="sendMessage()">
              <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/portal/js/config.js"></script>
<script src="/portal/js/auth.js"></script>
<script>
let allClients = [];
let activeClientId = null;
let messageSubscription = null;

(async () => {
  const session = await requireAuth('admin');
  if (!session) return;
  const name = session.user.user_metadata?.name ?? session.user.email;
  document.getElementById('userName').textContent = name;
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();

  await loadClients();

  // Open specific client from query param
  const params = new URLSearchParams(window.location.search);
  const clientParam = params.get('client');
  if (clientParam) openThread(clientParam);
})();

async function loadClients() {
  const { data: clients } = await supabase.from('clients').select('*').order('company_name');
  allClients = clients ?? [];

  // Get unread counts per client
  const { data: unread } = await supabase
    .from('messages')
    .select('client_id')
    .eq('sender_role', 'client')
    .is('read_at', null);

  const unreadMap = {};
  (unread ?? []).forEach(m => { unreadMap[m.client_id] = (unreadMap[m.client_id] ?? 0) + 1; });

  // Get latest message per client
  const { data: latest } = await supabase
    .from('messages')
    .select('client_id, content, created_at')
    .order('created_at', { ascending: false });

  const latestMap = {};
  (latest ?? []).forEach(m => { if (!latestMap[m.client_id]) latestMap[m.client_id] = m; });

  // Render threads sorted: unread first, then by latest message
  const sorted = [...allClients].sort((a, b) => {
    const ua = unreadMap[a.id] ?? 0, ub = unreadMap[b.id] ?? 0;
    if (ub !== ua) return ub - ua;
    const ta = latestMap[a.id]?.created_at ?? '';
    const tb = latestMap[b.id]?.created_at ?? '';
    return tb > ta ? 1 : -1;
  });

  const container = document.getElementById('threadItems');
  if (sorted.length === 0) {
    container.innerHTML = '<div style="padding:24px;text-align:center;font-size:13px;color:var(--ink-faint)">Geen klanten gevonden</div>';
    return;
  }
  container.innerHTML = sorted.map(c => {
    const u = unreadMap[c.id] ?? 0;
    const l = latestMap[c.id];
    return `
      <div class="thread-item${activeClientId === c.id ? ' active' : ''}" id="thread-${c.id}" onclick="openThread('${c.id}')">
        <div class="thread-avatar">${esc(c.company_name.charAt(0).toUpperCase())}</div>
        <div class="thread-info">
          <div class="thread-name">${esc(c.company_name)}</div>
          <div class="thread-preview">${l ? esc(l.content) : esc(c.contact_name)}</div>
        </div>
        <div class="thread-meta">
          <span class="thread-time">${l ? formatDate(l.created_at) : ''}</span>
          ${u > 0 ? `<span class="thread-unread">${u}</span>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

async function openThread(clientId) {
  activeClientId = clientId;
  const client = allClients.find(c => c.id === clientId);
  if (!client) return;

  // Update thread list active state
  document.querySelectorAll('.thread-item').forEach(el => el.classList.remove('active'));
  const threadEl = document.getElementById(`thread-${clientId}`);
  if (threadEl) threadEl.classList.add('active');

  // Show chat
  document.getElementById('noThreadSelected').style.display = 'none';
  const wrapper = document.getElementById('activeChatWrapper');
  wrapper.style.display = 'flex';

  document.getElementById('chatClientName').textContent = client.company_name;
  document.getElementById('chatClientSub').textContent = client.contact_name + (client.email ? ` · ${client.email}` : '');
  document.getElementById('chatClientLink').href = `/portal/admin/clients.html`;

  // Load messages
  await loadMessages(clientId);

  // Mark as read
  await supabase.from('messages')
    .update({ read_at: new Date().toISOString() })
    .eq('client_id', clientId)
    .eq('sender_role', 'client')
    .is('read_at', null);

  // Remove unread badge from thread
  const badge = threadEl?.querySelector('.thread-unread');
  if (badge) badge.remove();

  // Subscribe to real-time
  if (messageSubscription) supabase.removeChannel(messageSubscription);
  messageSubscription = supabase
    .channel(`messages-${clientId}`)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'messages',
      filter: `client_id=eq.${clientId}`
    }, () => loadMessages(clientId))
    .subscribe();
}

async function loadMessages(clientId) {
  const { data: messages } = await supabase
    .from('messages')
    .select('*')
    .eq('client_id', clientId)
    .order('created_at', { ascending: true });

  const container = document.getElementById('chatMessages');
  if (!messages || messages.length === 0) {
    container.innerHTML = `
      <div style="flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:6px;color:var(--ink-faint)">
        <div style="font-size:28px">✉️</div>
        <div style="font-size:13px">Nog geen berichten. Stuur de eerste!</div>
      </div>`;
    return;
  }

  let lastDate = '';
  container.innerHTML = messages.map(m => {
    const isAdmin = m.sender_role === 'admin';
    const d = new Date(m.created_at);
    const dateStr = d.toLocaleDateString('nl-NL', { weekday: 'long', day: 'numeric', month: 'long' });
    const timeStr = d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
    let dateDiv = '';
    if (dateStr !== lastDate) {
      lastDate = dateStr;
      dateDiv = `<div style="text-align:center;font-size:11px;color:var(--ink-faint);margin:8px 0;font-weight:600;letter-spacing:0.04em">${dateStr}</div>`;
    }
    return `${dateDiv}<div class="msg-bubble ${isAdmin ? 'msg-out' : 'msg-in'}">
      <div class="msg-text">${esc(m.content)}</div>
      <div class="msg-time">${timeStr}</div>
    </div>`;
  }).join('');

  // Scroll to bottom
  container.scrollTop = container.scrollHeight;
}

async function sendMessage() {
  if (!activeClientId) return;
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if (!text) return;

  const btn = document.getElementById('chatSendBtn');
  btn.disabled = true;
  input.value = '';

  const { error } = await supabase.from('messages').insert({
    client_id: activeClientId,
    sender_role: 'admin',
    content: text,
    read_at: new Date().toISOString()
  });

  btn.disabled = false;
  if (error) { handleError(error, 'sendMessage'); input.value = text; return; }
  await loadMessages(activeClientId);
  await loadClients(); // refresh thread list previews
}

// Send on Enter (Shift+Enter for newline)
document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function esc(str) {
  const d = document.createElement('div'); d.textContent = str ?? ''; return d.innerHTML;
}
</script>
</body>
</html>
