<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Wachtwoord vergeten — Doable AI Portaal</title>
  <link rel="icon" href="/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,700;1,500;1,700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F4EFE6; --ink: #100E09; --ink-muted: #5C5648;
      --accent: #1A7A47; --accent-h: #14623A;
      --border: rgba(24,22,15,0.10); --r: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      background: var(--bg); color: var(--ink);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      max-width: 420px; width: 100%;
      background: #fff; border: 1px solid var(--border);
      border-radius: 16px; padding: 40px 32px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.04);
    }
    .logo {
      font-family: 'Fraunces', serif; font-style: italic; font-weight: 700;
      font-size: 32px; text-align: center; margin-bottom: 8px;
    }
    .logo span { color: var(--accent); }
    .subtitle { text-align: center; color: var(--ink-muted); font-size: 14px; margin-bottom: 28px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 14px;
      font-family: inherit; font-size: 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--r); transition: border-color 150ms ease;
    }
    input:focus { outline: none; border-color: var(--accent); }
    .btn {
      width: 100%; padding: 12px;
      font-family: inherit; font-size: 14px; font-weight: 600;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--r);
      cursor: pointer; transition: background 150ms ease;
    }
    .btn:hover { background: var(--accent-h); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { padding: 12px; border-radius: var(--r); font-size: 13px; margin-top: 16px; }
    .msg.error { background: #FEE2E2; color: #991B1B; }
    .msg.success { background: #D1FAE5; color: #065F46; }
    .hint { font-size: 12px; color: var(--ink-muted); margin-bottom: 16px; line-height: 1.5; }
    .back-link {
      display: block; text-align: center;
      color: var(--ink-muted); font-size: 13px;
      text-decoration: none; margin-top: 24px;
    }
    .back-link:hover { color: var(--ink); }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">Doable<span>.</span></div>
    <p class="subtitle">Wachtwoord vergeten</p>
    <p class="hint">Vul je e-mailadres in en we sturen je een link om je wachtwoord opnieuw in te stellen.</p>

    <form id="forgotForm">
      <div class="form-group">
        <label for="email">E-mail</label>
        <input type="email" id="email" required autocomplete="email" placeholder="jij@bedrijf.nl" />
      </div>
      <button type="submit" class="btn" id="sendBtn">Reset-link versturen</button>
    </form>

    <div id="msg"></div>

    <a href="/portal/login.html" class="back-link">← Terug naar inloggen</a>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/portal/js/config.js"></script>
  <script>
    const form    = document.getElementById('forgotForm');
    const emailEl = document.getElementById('email');
    const sendBtn = document.getElementById('sendBtn');
    const msgEl   = document.getElementById('msg');

    function showMsg(text, type) {
      msgEl.innerHTML = `<div class="msg ${type}">${text}</div>`;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      sendBtn.disabled = true;
      sendBtn.textContent = 'Versturen…';
      msgEl.innerHTML = '';

      const { error } = await window.supabase.auth.resetPasswordForEmail(emailEl.value, {
        redirectTo: window.location.origin + '/portal/reset-password.html'
      });

      sendBtn.disabled = false;
      sendBtn.textContent = 'Reset-link versturen';

      if (error) return showMsg(error.message, 'error');
      showMsg('Check je inbox — we hebben een reset-link gestuurd. Je kunt dit venster sluiten.', 'success');
      form.style.display = 'none';
    });
  </script>
</body>
</html>
