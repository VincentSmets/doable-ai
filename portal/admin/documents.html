<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Documenten — Doable AI Beheer</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/portal/portal.css" />
</head>
<body>
<div class="portal-layout">
  <aside class="sidebar">
    <div class="sidebar-logo">Doable<span>.</span><span class="sidebar-role-badge">Admin</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Overzicht</div>
      <a href="/portal/admin/index.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <div class="sidebar-section">Klanten</div>
      <a href="/portal/admin/clients.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>CRM — Klanten</a>
      <a href="/portal/admin/messages.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Berichten</a>
      <div class="sidebar-section">Financieel</div>
      <a href="/portal/admin/invoices.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Facturen</a>
      <a href="/portal/admin/proposals.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Offertes</a>
      <div class="sidebar-section">Projecten</div>
      <a href="/portal/admin/documents.html" class="sidebar-link active">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Documenten</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="userAvatar">V</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">Vincent</div>
          <div class="sidebar-user-role">Beheerder</div>
        </div>
        <button class="logout-btn" onclick="logout()">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">Documenten</span>
      <div class="topbar-actions">
        <select id="filterClient" class="btn btn-outline btn-sm" style="font-weight:500;padding:5px 10px">
          <option value="">Alle klanten</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="openUploadModal()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Document uploaden
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="card">
        <div class="card-header">
          <span class="card-title" id="docCount">Documenten</span>
          <input type="search" id="searchInput" placeholder="Zoek op titel…"
            style="padding:6px 10px;border:1px solid var(--border-s);border-radius:var(--r);background:var(--bg);color:var(--ink);font-size:13px;width:220px" />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Titel</th>
                <th>Klant</th>
                <th>Type</th>
                <th>Geüpload op</th>
                <th>Acties</th>
              </tr>
            </thead>
            <tbody id="docsTable">
              <tr><td colspan="5" style="text-align:center;padding:32px"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- UPLOAD MODAL -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <span class="modal-title">Document uploaden</span>
      <button class="modal-close" onclick="closeUploadModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Klant *</label>
        <select id="uClient" required><option value="">— Selecteer klant —</option></select>
      </div>
      <div class="form-group">
        <label>Titel *</label>
        <input type="text" id="uTitle" required placeholder="Analyse rapport — Fase 1" />
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="uType">
          <option value="rapport">Rapport</option>
          <option value="contract">Contract</option>
          <option value="handleiding">Handleiding</option>
          <option value="offerte">Offerte</option>
          <option value="overig">Overig</option>
        </select>
      </div>
      <div class="form-group">
        <label>Bestand *</label>
        <input type="file" id="uFile" accept=".pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.png,.jpg,.zip" style="padding:8px;border:1px dashed var(--border-s);border-radius:var(--r);width:100%;cursor:pointer;background:var(--bg);color:var(--ink)" />
        <div style="font-size:11px;color:var(--ink-faint);margin-top:4px">PDF, Word, Excel, afbeelding of ZIP — max 50 MB</div>
      </div>
      <div id="uploadProgress" style="display:none">
        <div style="font-size:13px;color:var(--ink-muted);margin-bottom:6px" id="uploadStatus">Uploaden…</div>
        <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden">
          <div id="uploadBar" style="height:100%;background:var(--accent);width:0%;transition:width 300ms ease;border-radius:2px"></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeUploadModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="uploadDocument()" id="uploadBtn">Uploaden</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/portal/js/config.js"></script>
<script src="/portal/js/auth.js"></script>
<script>
let allDocs    = [];
let allClients = [];

(async () => {
  const session = await requireAuth('admin');
  if (!session) return;
  const name = session.user.user_metadata?.name ?? session.user.email;
  document.getElementById('userName').textContent = name;
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
  await Promise.all([loadClients(), loadDocs()]);
})();

async function loadClients() {
  const { data } = await supabase.from('clients').select('id, company_name').order('company_name');
  allClients = data ?? [];

  const filter = document.getElementById('filterClient');
  const uSel   = document.getElementById('uClient');
  allClients.forEach(c => {
    [filter, uSel].forEach(sel => {
      const opt = document.createElement('option');
      opt.value = c.id; opt.textContent = c.company_name;
      sel.appendChild(opt);
    });
  });
}

async function loadDocs() {
  const { data, error } = await supabase
    .from('documents')
    .select('*, clients(company_name)')
    .order('created_at', { ascending: false });

  if (error) { handleError(error, 'loadDocs'); return; }
  allDocs = data ?? [];
  renderDocs(allDocs);
  document.getElementById('docCount').textContent = `Documenten (${allDocs.length})`;
}

function renderDocs(list) {
  const tbody = document.getElementById('docsTable');
  if (list.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">
      <div class="empty-state-icon">📁</div>
      <div class="empty-state-title">Nog geen documenten</div>
      <p>Upload een document via de knop rechtsboven.</p>
    </div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(d => `
    <tr>
      <td class="td-primary">
        <div style="display:flex;align-items:center;gap:8px">
          <span>${fileIcon(d.file_path)}</span>
          ${esc(d.title)}
        </div>
      </td>
      <td>${esc(d.clients?.company_name ?? '—')}</td>
      <td class="td-muted">${esc(d.doc_type ?? 'overig')}</td>
      <td class="td-muted">${formatDate(d.created_at)}</td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="downloadDoc('${esc(d.file_path)}','${esc(d.title)}')">Download</button>
        <button class="btn btn-ghost btn-sm btn-danger" onclick="deleteDoc('${d.id}','${esc(d.file_path)}')">Verwijder</button>
      </td>
    </tr>
  `).join('');
}

function fileIcon(path) {
  if (!path) return '📄';
  const ext = path.split('.').pop().toLowerCase();
  if (['pdf'].includes(ext)) return '📕';
  if (['doc','docx'].includes(ext)) return '📝';
  if (['xls','xlsx'].includes(ext)) return '📊';
  if (['ppt','pptx'].includes(ext)) return '📑';
  if (['png','jpg','jpeg','gif'].includes(ext)) return '🖼️';
  if (['zip','rar'].includes(ext)) return '🗜️';
  return '📄';
}

document.getElementById('searchInput').addEventListener('input', filterDocs);
document.getElementById('filterClient').addEventListener('change', filterDocs);
function filterDocs() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const c = document.getElementById('filterClient').value;
  renderDocs(allDocs.filter(d => {
    const mq = !q || d.title.toLowerCase().includes(q);
    const mc = !c || d.client_id === c;
    return mq && mc;
  }));
}

function openUploadModal() { document.getElementById('uploadModal').classList.add('open'); }
function closeUploadModal() {
  document.getElementById('uploadModal').classList.remove('open');
  document.getElementById('uFile').value = '';
  document.getElementById('uploadProgress').style.display = 'none';
  document.getElementById('uploadBar').style.width = '0%';
}

async function uploadDocument() {
  const clientId = document.getElementById('uClient').value;
  const title    = document.getElementById('uTitle').value.trim();
  const docType  = document.getElementById('uType').value;
  const file     = document.getElementById('uFile').files[0];

  if (!clientId) { toast('Selecteer een klant.', 'error'); return; }
  if (!title)    { toast('Vul een titel in.', 'error'); return; }
  if (!file)     { toast('Selecteer een bestand.', 'error'); return; }
  if (file.size > 50 * 1024 * 1024) { toast('Bestand mag maximaal 50 MB zijn.', 'error'); return; }

  const btn = document.getElementById('uploadBtn');
  btn.disabled = true; btn.textContent = 'Bezig…';
  document.getElementById('uploadProgress').style.display = 'block';
  document.getElementById('uploadBar').style.width = '30%';
  document.getElementById('uploadStatus').textContent = 'Uploaden naar opslag…';

  // Build storage path: {clientId}/{timestamp}_{filename}
  const safeFilename = file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
  const filePath = `${clientId}/${Date.now()}_${safeFilename}`;

  const { error: storageErr } = await supabase.storage
    .from('documents')
    .upload(filePath, file, { upsert: false });

  document.getElementById('uploadBar').style.width = '70%';

  if (storageErr) {
    handleError(storageErr, 'storage upload');
    btn.disabled = false; btn.textContent = 'Uploaden';
    document.getElementById('uploadProgress').style.display = 'none';
    return;
  }

  document.getElementById('uploadStatus').textContent = 'Registreren in database…';

  const { error: dbErr } = await supabase.from('documents').insert({
    client_id: clientId,
    title,
    doc_type: docType,
    file_path: filePath,
  });

  document.getElementById('uploadBar').style.width = '100%';
  btn.disabled = false; btn.textContent = 'Uploaden';

  if (dbErr) { handleError(dbErr, 'documents insert'); return; }
  toast('Document geüpload.', 'success');
  closeUploadModal();
  await loadDocs();
}

async function downloadDoc(path, title) {
  const { data, error } = await supabase.storage.from('documents').createSignedUrl(path, 60);
  if (error) { handleError(error, 'download'); return; }
  const a = document.createElement('a');
  a.href = data.signedUrl; a.download = title; a.click();
}

async function deleteDoc(id, path) {
  if (!confirm('Document verwijderen? Dit kan niet ongedaan worden gemaakt.')) return;
  const { error: storErr } = await supabase.storage.from('documents').remove([path]);
  if (storErr) { handleError(storErr, 'storage delete'); return; }
  const { error: dbErr } = await supabase.from('documents').delete().eq('id', id);
  if (dbErr) { handleError(dbErr, 'db delete'); return; }
  toast('Document verwijderd.', 'success');
  await loadDocs();
}

function esc(str) {
  const d = document.createElement('div'); d.textContent = str ?? ''; return d.innerHTML;
}
</script>
</body>
</html>
