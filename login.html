<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggen — Doable AI</title>
  <link rel="icon" href="favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@1,9..144,700&family=Figtree:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #F2EDE4; --surface: #FFFFFF; --ink: #18160F; --ink-muted: #64604E;
      --ink-faint: #A8A391; --accent: #3D6B50; --accent-h: #2F5440;
      --accent-2: #C4803A; --border: rgba(24,22,15,0.09); --border-s: rgba(24,22,15,0.15);
      --r: 8px; --r-lg: 14px; --shadow-md: 0 4px 24px rgba(0,0,0,0.08);
    }
    [data-theme="dark"] {
      --bg: #0A0906; --surface: #111009; --ink: #EDE8DF; --ink-muted: #8A8372;
      --ink-faint: #55524A; --accent: #5A9470; --accent-h: #6AAF82;
      --border: rgba(237,232,223,0.07); --border-s: rgba(237,232,223,0.14);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Figtree', sans-serif;
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-md);
    }
    .logo {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 700;
      font-size: 24px;
      letter-spacing: -0.02em;
      color: var(--ink);
      margin-bottom: 6px;
    }
    .logo span { color: var(--accent); }
    .login-sub { font-size: 14px; color: var(--ink-muted); margin-bottom: 32px; }
    .form-group { display: flex; flex-direction: column; gap: 5px; margin-bottom: 14px; }
    label { font-size: 13px; font-weight: 500; color: var(--ink-muted); }
    input {
      width: 100%; padding: 10px 12px;
      border: 1px solid var(--border-s);
      border-radius: var(--r);
      background: var(--bg);
      color: var(--ink);
      font-family: 'Figtree', sans-serif;
      font-size: 14px;
      transition: border-color 150ms ease, box-shadow 150ms ease;
    }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,107,80,0.10); }
    .btn-login {
      width: 100%; padding: 11px;
      background: var(--accent); color: #fff;
      border: none; border-radius: var(--r);
      font-family: 'Figtree', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
      transition: background 140ms ease;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn-login:hover { background: var(--accent-h); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }
    .error-msg {
      background: rgba(192,57,43,0.10); color: #C0392B;
      border-radius: var(--r); padding: 10px 12px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }
    .error-msg.show { display: block; }
    .forgot-link {
      text-align: center; margin-top: 16px;
      font-size: 13px; color: var(--ink-faint);
    }
    .forgot-link a { color: var(--accent); }
    .back-link {
      text-align: center; margin-top: 24px; padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .back-link a { font-size: 13px; color: var(--ink-muted); }
    .back-link a:hover { color: var(--accent); }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }
    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Reset wachtwoord view */
    .reset-view { display: none; }
    .reset-view.active { display: block; }
    .login-view.hidden { display: none; }
    .success-msg {
      background: rgba(61,107,80,0.10); color: var(--accent);
      border-radius: var(--r); padding: 10px 12px;
      font-size: 13px; margin-bottom: 14px; display: none;
    }
    .success-msg.show { display: block; }
  </style>
</head>
<body>
  <div class="login-box">
    <!-- LOGIN VIEW -->
    <div class="login-view" id="loginView">
      <div class="logo">Doable<span>.</span></div>
      <p class="login-sub">Portaal — log in met je account</p>

      <div class="error-msg" id="errorMsg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">E-mailadres</label>
          <input type="email" id="email" placeholder="jouw@email.nl" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Wachtwoord</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-login" id="loginBtn">
          <span class="btn-text">Inloggen →</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="forgot-link">
        <a href="#" id="forgotLink">Wachtwoord vergeten?</a>
      </div>
      <div class="back-link">
        <a href="/index.html">← Terug naar de website</a>
      </div>
    </div>

    <!-- RESET VIEW -->
    <div class="reset-view" id="resetView">
      <div class="logo">Doable<span>.</span></div>
      <p class="login-sub">Voer je e-mailadres in — je ontvangt een resetlink</p>

      <div class="error-msg" id="resetErrorMsg"></div>
      <div class="success-msg" id="resetSuccessMsg"></div>

      <form id="resetForm">
        <div class="form-group">
          <label for="resetEmail">E-mailadres</label>
          <input type="email" id="resetEmail" placeholder="jouw@email.nl" required />
        </div>
        <button type="submit" class="btn-login" id="resetBtn">
          <span class="btn-text">Stuur resetlink →</span>
          <div class="spinner"></div>
        </button>
      </form>

      <div class="forgot-link">
        <a href="#" id="backToLogin">← Terug naar inloggen</a>
      </div>
    </div>
  </div>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="portal/js/config.js"></script>
  <script>
    const loginForm    = document.getElementById('loginForm');
    const resetForm    = document.getElementById('resetForm');
    const loginBtn     = document.getElementById('loginBtn');
    const resetBtn     = document.getElementById('resetBtn');
    const errorMsg     = document.getElementById('errorMsg');
    const resetErrorMsg = document.getElementById('resetErrorMsg');
    const resetSuccessMsg = document.getElementById('resetSuccessMsg');

    // Check of al ingelogd
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (session) redirectByRole(session.user);
    })();

    function redirectByRole(user) {
      const role = user.user_metadata?.role ?? 'client';
      window.location.href = role === 'admin'
        ? '/portal/admin/index.html'
        : '/portal/client/index.html';
    }

    function setLoading(btn, loading) {
      btn.classList.toggle('loading', loading);
      btn.disabled = loading;
    }

    function showError(el, msg) {
      el.textContent = msg;
      el.classList.add('show');
    }

    function hideError(el) { el.classList.remove('show'); }

    // Login
    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError(errorMsg);
      setLoading(loginBtn, true);

      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      const { data, error } = await supabase.auth.signInWithPassword({ email, password });

      if (error) {
        showError(errorMsg, error.message === 'Invalid login credentials'
          ? 'Onjuiste e-mail of wachtwoord.'
          : error.message);
        setLoading(loginBtn, false);
        return;
      }
      redirectByRole(data.user);
    });

    // Wisselen naar reset view
    document.getElementById('forgotLink').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('loginView').classList.add('hidden');
      document.getElementById('resetView').classList.add('active');
    });

    document.getElementById('backToLogin').addEventListener('click', (e) => {
      e.preventDefault();
      document.getElementById('loginView').classList.remove('hidden');
      document.getElementById('resetView').classList.remove('active');
    });

    // Wachtwoord reset
    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideError(resetErrorMsg);
      setLoading(resetBtn, true);

      const email = document.getElementById('resetEmail').value.trim();
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/portal/reset-password.html'
      });

      setLoading(resetBtn, false);
      if (error) {
        showError(resetErrorMsg, error.message);
      } else {
        resetSuccessMsg.textContent = 'Resetlink verstuurd! Controleer je inbox.';
        resetSuccessMsg.classList.add('show');
        resetForm.reset();
      }
    });
  </script>
</body>
</html>
