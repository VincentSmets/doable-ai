<!DOCTYPE html>
<html lang="nl" data-theme="light">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Klanten — Doable AI Beheer</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/portal/portal.css" />
</head>
<body>
<div class="portal-layout">
  <!-- SIDEBAR (zelfde als dashboard) -->
  <aside class="sidebar">
    <div class="sidebar-logo">Doable<span>.</span><span class="sidebar-role-badge">Admin</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section">Overzicht</div>
      <a href="/portal/admin/index.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dashboard</a>
      <div class="sidebar-section">Klanten</div>
      <a href="/portal/admin/clients.html" class="sidebar-link active">
        <svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>CRM — Klanten</a>
      <a href="/portal/admin/messages.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Berichten</a>
      <div class="sidebar-section">Financieel</div>
      <a href="/portal/admin/invoices.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Facturen</a>
      <a href="/portal/admin/proposals.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>Offertes</a>
      <div class="sidebar-section">Projecten</div>
      <a href="/portal/admin/documents.html" class="sidebar-link">
        <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>Documenten</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user">
        <div class="sidebar-avatar" id="userAvatar">V</div>
        <div class="sidebar-user-info">
          <div class="sidebar-user-name" id="userName">Vincent</div>
          <div class="sidebar-user-role">Beheerder</div>
        </div>
        <button class="logout-btn" onclick="logout()">
          <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-content">
    <header class="topbar">
      <span class="topbar-title">CRM — Klanten</span>
      <div class="topbar-actions">
        <select id="filterStatus" class="btn btn-outline btn-sm" style="font-weight:500;padding:5px 10px">
          <option value="">Alle statussen</option>
          <option value="prospect">Prospect</option>
          <option value="active">Actief</option>
          <option value="past">Afgerond</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="openModal()">
          <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nieuwe klant
        </button>
      </div>
    </header>

    <div class="page-content">
      <div class="card">
        <div class="card-header">
          <span class="card-title" id="clientCount">Klanten</span>
          <input type="search" id="searchInput" placeholder="Zoek op naam of bedrijf…"
            style="padding:6px 10px;border:1px solid var(--border-s);border-radius:var(--r);background:var(--bg);color:var(--ink);font-size:13px;width:220px" />
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Bedrijf</th>
                <th>Contactpersoon</th>
                <th>Sector</th>
                <th>Status</th>
                <th>E-mail</th>
                <th>Acties</th>
              </tr>
            </thead>
            <tbody id="clientsTable">
              <tr><td colspan="6" style="text-align:center;padding:32px"><div class="spinner"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- MODAL: Nieuwe / Bewerk klant -->
<div class="modal-overlay" id="clientModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalTitle">Nieuwe klant</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <form id="clientForm">
        <input type="hidden" id="clientId" />
        <div class="form-row">
          <div class="form-group">
            <label>Bedrijfsnaam *</label>
            <input type="text" id="fCompany" required placeholder="De Vries BV" />
          </div>
          <div class="form-group">
            <label>Contactpersoon *</label>
            <input type="text" id="fContact" required placeholder="Jan de Vries" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>E-mailadres *</label>
            <input type="email" id="fEmail" required placeholder="jan@devries.nl" />
          </div>
          <div class="form-group">
            <label>Telefoon</label>
            <input type="tel" id="fPhone" placeholder="+31 6 12 34 56 78" />
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Sector</label>
            <select id="fSector">
              <option value="">— Selecteer sector —</option>
              <option>Bouw & installatie</option>
              <option>Zorg & welzijn</option>
              <option>Administratie & boekhouding</option>
              <option>Retail & horeca</option>
              <option>Transport & logistiek</option>
              <option>Agrarisch</option>
              <option>Zakelijke dienstverlening</option>
              <option>Overig</option>
            </select>
          </div>
          <div class="form-group">
            <label>Status</label>
            <select id="fStatus">
              <option value="prospect">Prospect</option>
              <option value="active">Actief</option>
              <option value="past">Afgerond</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Stad / Gemeente</label>
          <input type="text" id="fCity" placeholder="Groningen" />
        </div>
        <div class="form-group">
          <label>Notities (intern)</label>
          <textarea id="fNotes" placeholder="Interne aantekeningen over deze klant…"></textarea>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">Annuleren</button>
      <button class="btn btn-primary" onclick="saveClient()" id="saveBtn">Opslaan</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="/portal/js/config.js"></script>
<script src="/portal/js/auth.js"></script>
<script>
let allClients = [];

(async () => {
  const session = await requireAuth('admin');
  if (!session) return;
  const name = session.user.user_metadata?.name ?? session.user.email;
  document.getElementById('userName').textContent = name;
  document.getElementById('userAvatar').textContent = name.charAt(0).toUpperCase();
  await loadClients();
})();

async function loadClients() {
  const { data, error } = await supabase
    .from('clients')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) { handleError(error, 'loadClients'); return; }
  allClients = data ?? [];
  renderClients(allClients);
  document.getElementById('clientCount').textContent = `Klanten (${allClients.length})`;
}

function renderClients(list) {
  const tbody = document.getElementById('clientsTable');
  if (list.length === 0) {
    tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">
      <div class="empty-state-icon">👥</div>
      <div class="empty-state-title">Nog geen klanten</div>
      <p>Voeg je eerste klant toe via de knop rechtsboven.</p>
    </div></td></tr>`;
    return;
  }
  tbody.innerHTML = list.map(c => `
    <tr>
      <td class="td-primary">${esc(c.company_name)}</td>
      <td>${esc(c.contact_name)}</td>
      <td class="td-muted">${esc(c.sector ?? '—')}</td>
      <td>${statusBadge(c.status)}</td>
      <td class="td-muted"><a href="mailto:${esc(c.email)}" style="color:var(--accent)">${esc(c.email)}</a></td>
      <td class="td-actions">
        <button class="btn btn-ghost btn-sm" onclick="editClient('${c.id}')">Bewerk</button>
        <button class="btn btn-ghost btn-sm" onclick="viewMessages('${c.id}')">Berichten</button>
      </td>
    </tr>
  `).join('');
}

// Zoek + filter
document.getElementById('searchInput').addEventListener('input', filterClients);
document.getElementById('filterStatus').addEventListener('change', filterClients);

function filterClients() {
  const q      = document.getElementById('searchInput').value.toLowerCase();
  const status = document.getElementById('filterStatus').value;
  const filtered = allClients.filter(c => {
    const matchQ = !q || c.company_name.toLowerCase().includes(q) || c.contact_name.toLowerCase().includes(q);
    const matchS = !status || c.status === status;
    return matchQ && matchS;
  });
  renderClients(filtered);
}

// Modal
function openModal(client = null) {
  document.getElementById('modalTitle').textContent = client ? 'Klant bewerken' : 'Nieuwe klant';
  document.getElementById('clientId').value   = client?.id ?? '';
  document.getElementById('fCompany').value   = client?.company_name ?? '';
  document.getElementById('fContact').value   = client?.contact_name ?? '';
  document.getElementById('fEmail').value     = client?.email ?? '';
  document.getElementById('fPhone').value     = client?.phone ?? '';
  document.getElementById('fSector').value    = client?.sector ?? '';
  document.getElementById('fStatus').value    = client?.status ?? 'prospect';
  document.getElementById('fCity').value      = client?.city ?? '';
  document.getElementById('fNotes').value     = client?.notes ?? '';
  document.getElementById('clientModal').classList.add('open');
}

function closeModal() {
  document.getElementById('clientModal').classList.remove('open');
}

function editClient(id) {
  const c = allClients.find(c => c.id === id);
  if (c) openModal(c);
}

function viewMessages(clientId) {
  window.location.href = `/portal/admin/messages.html?client=${clientId}`;
}

async function saveClient() {
  const id = document.getElementById('clientId').value;
  const payload = {
    company_name: document.getElementById('fCompany').value.trim(),
    contact_name: document.getElementById('fContact').value.trim(),
    email:        document.getElementById('fEmail').value.trim(),
    phone:        document.getElementById('fPhone').value.trim() || null,
    sector:       document.getElementById('fSector').value || null,
    status:       document.getElementById('fStatus').value,
    city:         document.getElementById('fCity').value.trim() || null,
    notes:        document.getElementById('fNotes').value.trim() || null,
  };

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Opslaan...';

  let error;
  if (id) {
    ({ error } = await supabase.from('clients').update(payload).eq('id', id));
  } else {
    ({ error } = await supabase.from('clients').insert(payload));
  }

  btn.disabled = false; btn.textContent = 'Opslaan';
  if (error) { handleError(error, 'saveClient'); return; }
  toast(id ? 'Klant bijgewerkt.' : 'Klant toegevoegd.', 'success');
  closeModal();
  await loadClients();
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str ?? '';
  return d.innerHTML;
}
</script>
</body>
</html>
